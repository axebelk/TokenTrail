name: tokentrail

# Production stack that BUILDS every image from this checkout — use this
# instead of deploy/docker-compose.prod.yml when you'd rather build on the
# server than pull from GHCR (no registry/CI dependency).
#
#   docker compose up -d --build
#
# That's it. api/gateway/web are published on 127.0.0.1:4000/4100/3000 for
# the reverse proxy already running on this host — see
# deploy/nginx-site.conf.example.
#
# Redeploy after a `git pull`: images are cached by tag, so a plain `up`
# will NOT pick up new source changes on its own — always pass `--build`
# (as above) or run `docker compose build` first.
#
# All secrets come from .env in this directory (see .env.example, loaded
# automatically — no --env-file flag needed). Required values use
# ${VAR:?...} so `up` fails fast with a clear message instead of deploying
# with an empty secret.

x-app-env: &app-env
  DATABASE_URL: postgresql://tokentrail:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/tokentrail
  REDIS_URL: redis://redis:6379
  TOKENTRAIL_MASTER_KEY: ${TOKENTRAIL_MASTER_KEY:?set TOKENTRAIL_MASTER_KEY in .env — openssl rand -base64 32}
  JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env — openssl rand -base64 48}
  PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:?set PUBLIC_BASE_URL in .env to your public https:// domain}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  NODE_ENV: production
  EXPORTS_DIR: /data/exports
  EVENT_RETENTION_DAYS: ${EVENT_RETENTION_DAYS:-90}
  SUPERADMIN_EMAILS: ${SUPERADMIN_EMAILS:-}
  LICENSE_KEY: ${LICENSE_KEY:-}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tokentrail
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: tokentrail
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tokentrail"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb",
              "--maxmemory-policy", "noeviction"]   # streams must not be evicted
    volumes: [redisdata:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  migrate:
    build: { context: ., dockerfile: apps/api/Dockerfile }
    command: ["sh", "-c",
      "./node_modules/.bin/prisma migrate deploy --schema node_modules/@tokentrail/db/prisma/schema.prisma && ./node_modules/.bin/tsx node_modules/@tokentrail/db/src/seed/index.ts"]
    environment: *app-env
    depends_on:
      postgres: { condition: service_healthy }
    restart: "no"

  api:
    build: { context: ., dockerfile: apps/api/Dockerfile }
    ports: ["127.0.0.1:4000:4000"]
    environment:
      <<: *app-env
      API_PORT: "4000"
      SMTP_URL: ${SMTP_URL:-}
    volumes: [exports:/data/exports] # shared with worker: reads generated CSVs for download
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
    restart: unless-stopped

  gateway:
    build: { context: ., dockerfile: apps/gateway/Dockerfile }
    ports: ["127.0.0.1:4100:4100"]
    environment:
      <<: *app-env
      GATEWAY_PORT: "4100"
      GATEWAY_FAILURE_POLICY: ${GATEWAY_FAILURE_POLICY:-FAIL_OPEN}
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
    # NOTE: `deploy.replicas` only takes effect under `docker stack deploy`
    # (Swarm) — plain `docker compose up` ignores it silently. `--scale
    # gateway=3` won't work either as-is: the fixed 127.0.0.1:4100 port
    # above can only bind once. To run multiple gateway containers, drop
    # that port mapping and put a load balancer in front of the replicas.
    deploy:
      replicas: ${GATEWAY_REPLICAS:-1}
    restart: unless-stopped

  worker:
    build: { context: ., dockerfile: apps/worker/Dockerfile }
    environment:
      <<: *app-env
      SMTP_URL: ${SMTP_URL:-}
    volumes: [exports:/data/exports]
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
    restart: unless-stopped

  web:
    build: { context: ., dockerfile: apps/web/Dockerfile }
    ports: ["127.0.0.1:3000:80"] # web image serves on 80 internally (nginx)
    restart: unless-stopped

volumes:
  pgdata: {}
  redisdata: {}
  exports: {}
