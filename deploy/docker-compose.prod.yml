name: tokentrail

# Production stack that PULLS pre-built images from GHCR (published by
# .github/workflows/docker-publish.yml) — no local build step.
#
# Two ways to run this, see DEPLOY.md for the full walkthrough:
#
#   Path A — no reverse proxy on this host yet: let the bundled Caddy
#   container own :80/:443 and get you HTTPS automatically.
#     docker compose -f deploy/docker-compose.prod.yml --profile caddy \
#       --env-file .env up -d
#
#   Path B — you already run nginx/Caddy/Traefik on this host for other
#   sites (so :80/:443 are taken): skip the "caddy" profile and layer the
#   host-proxy override, which publishes api/gateway/web on 127.0.0.1 only
#   for your existing proxy to reach.
#     docker compose -f deploy/docker-compose.prod.yml \
#       -f deploy/docker-compose.host-proxy.yml --env-file .env up -d
#
# All secrets come from the --env-file (.env). See DEPLOY.md. Required
# values use ${VAR:?...} so `up` fails fast with a clear message instead of
# deploying with an empty secret.

x-app-env: &app-env
  DATABASE_URL: postgresql://tokentrail:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/tokentrail
  REDIS_URL: redis://redis:6379
  TOKENTRAIL_MASTER_KEY: ${TOKENTRAIL_MASTER_KEY:?set TOKENTRAIL_MASTER_KEY in .env — openssl rand -base64 32}
  JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env — openssl rand -base64 48}
  PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:?set PUBLIC_BASE_URL in .env to your public https:// domain}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  NODE_ENV: production
  EXPORTS_DIR: /data/exports
  EVENT_RETENTION_DAYS: ${EVENT_RETENTION_DAYS:-90}
  SUPERADMIN_EMAILS: ${SUPERADMIN_EMAILS:-}
  LICENSE_KEY: ${LICENSE_KEY:-}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tokentrail
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: tokentrail
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tokentrail"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb",
              "--maxmemory-policy", "noeviction"]   # streams must not be evicted
    volumes: [redisdata:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  migrate:
    image: ${IMAGE_PREFIX}-api:${TAG:-latest}
    command: ["sh", "-c",
      "./node_modules/.bin/prisma migrate deploy --schema node_modules/@tokentrail/db/prisma/schema.prisma && ./node_modules/.bin/tsx node_modules/@tokentrail/db/src/seed/index.ts"]
    environment: *app-env
    depends_on:
      postgres: { condition: service_healthy }
    restart: "no"

  api:
    image: ${IMAGE_PREFIX}-api:${TAG:-latest}
    environment:
      <<: *app-env
      API_PORT: "4000"
      SMTP_URL: ${SMTP_URL:-}
    volumes: [exports:/data/exports] # shared with worker: reads generated CSVs for download
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
    restart: unless-stopped

  gateway:
    image: ${IMAGE_PREFIX}-gateway:${TAG:-latest}
    environment:
      <<: *app-env
      GATEWAY_PORT: "4100"
      GATEWAY_FAILURE_POLICY: ${GATEWAY_FAILURE_POLICY:-FAIL_OPEN}
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
    # NOTE: `deploy.replicas` only takes effect under `docker stack deploy`
    # (Swarm) — plain `docker compose up` ignores it silently. To actually
    # run more than one gateway container, scale explicitly instead:
    #   docker compose up -d --scale gateway=3
    deploy:
      replicas: ${GATEWAY_REPLICAS:-1}
    restart: unless-stopped

  worker:
    image: ${IMAGE_PREFIX}-worker:${TAG:-latest}
    environment:
      <<: *app-env
      SMTP_URL: ${SMTP_URL:-}
    volumes: [exports:/data/exports]
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
    restart: unless-stopped

  web:
    image: ${IMAGE_PREFIX}-web:${TAG:-latest}
    restart: unless-stopped

  # Opt-in via `--profile caddy` (Path A). Skip this profile entirely if a
  # reverse proxy already owns :80/:443 on this host (Path B) — see
  # docker-compose.host-proxy.yml.
  caddy:
    image: caddy:2-alpine
    profiles: ["caddy"]
    # With DOMAIN set, Caddy binds the domain on 443 (and 80→443 redirect) and
    # provisions a Let's Encrypt cert automatically.
    ports: ["80:80", "443:443"]
    environment:
      DOMAIN: ${DOMAIN:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
    depends_on: [api, gateway, web]
    restart: unless-stopped

volumes:
  pgdata: {}
  redisdata: {}
  exports: {}
  caddydata: {}
